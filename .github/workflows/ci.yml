name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHONHASHSEED: "0"
  TZ: UTC
  UV_NO_PROGRESS: "1"

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python and dependencies
        uses: ./.github/actions/setup-python-uv

      - name: Verify dependency lock is current
        shell: bash
        run: |
          uv pip compile requirements-dev.txt \
            --python-version 3.13 \
            --python-platform linux \
            --generate-hashes \
            --output-file requirements-ci.lock
          git diff --exit-code -- requirements-ci.lock

      - name: Lint
        run: uv run ruff check hermes/ tests/ scripts/

      - name: Type check
        run: uv run mypy hermes/

      - name: Validate Compose configuration
        run: docker compose config --quiet

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python and dependencies
        uses: ./.github/actions/setup-python-uv

      - name: Run deterministic unit gate
        run: >-
          uv run pytest -p no:cacheprovider tests/unit/
          -m "not slow" --timeout=120 -q

  integration:
    name: Deterministic integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python and dependencies
        uses: ./.github/actions/setup-python-uv

      - name: Run local integration gate
        run: >-
          uv run pytest -p no:cacheprovider
          tests/dry/ tests/integration/ tests/e2e/
          -m "not slow and not network" --timeout=120 -q

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out full history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
