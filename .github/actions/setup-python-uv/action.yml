name: setup-python-uv

description: Set up Python, uv, a fresh virtual environment, and project dependencies.

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.13"

outputs:
  python-version:
    description: Installed Python version
    value: ${{ steps.setup-python.outputs.python-version }}

runs:
  using: composite
  steps:
    - name: Set up Python
      id: setup-python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.11.7"
        enable-cache: true
        cache-dependency-glob: |
          requirements.txt
          requirements-dev.txt
          requirements-ci.lock

    - name: Create virtual environment
      shell: bash
      run: uv venv --python ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: uv pip install --require-hashes -r requirements-ci.lock
