[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    # Tests que ejercitan la app real (FastAPI TestClient + DB SQLite +
    # agent loop). Corren en CI pero mas lentos que los unit tests.
    integration: marks tests that require real services (deselect with -m "not integration")
    # Tests que tardan >1s con waits reales (timeouts, retries, sleeps).
    # Se excluyen del CI diario (suite <60s) y se reservan para el
    # nightly job (.github/workflows/nightly-tests.yml).
    slow: marks tests that take >1s with real waits (deselect with -m "not slow" in CI to keep suite <60s; run with --runslow or -m slow)
    # Tests que hacen requests HTTP reales contra servicios externos
    # (ej. contra hermes-deploy real en LAN). NO corren en CI ni en
    # nightly por defecto; se corren manualmente cuando se valida un
    # deploy end-to-end.
    network: marks tests that hit external services (deselect by default; run with --runnetwork)
    # End-to-end tests del pipeline completo (real DB, real drop folder,
    # FastAPI TestClient). Cada test crea su propio tmp_path aislado.
    # Mas lentos que los integration tests (~3-5s total para la suite
    # completa) pero cubren cross-component bugs que unit+integration
    # tests pueden no detectar. No corren en CI por defecto (se corren
    # manualmente con `pytest -m e2e` o via scripts/e2e_demo.py).
    e2e: marks full end-to-end pipeline tests (deselect with -m "not e2e")
filterwarnings =
    # Libs externas: deprecations no actionables
    ignore:Using `httpx` with `starlette.testclient` is deprecated
    ignore:pythonjsonlogger.jsonlogger has been moved:DeprecationWarning
    # aiosqlite: thread cleanup en tests async (issue conocido, no es bug de producción)
    ignore:.*was deleted before being closed:ResourceWarning
    ignore:Exception in thread.*_connection_worker_thread
    # LLMRouter en integration tests: httpx.AsyncClient no se cierra (build_message_router lo crea interno)
    ignore:coroutine 'LLMRouter._invoke' was never awaited:RuntimeWarning
